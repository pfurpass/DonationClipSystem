<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DonationClip Overlay</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:100vw; height:100vh; background:transparent; overflow:hidden; }

    #videoContainer {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:#000;
      opacity:0; transition:opacity 0.4s ease;
      pointer-events:none;
    }
    #videoContainer.visible { opacity:1; }

    #ytFrame { width:100%; height:100%; border:none; display:block; }

    #donorBadge {
      position:absolute; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(0,0,0,0.72); color:#fff;
      padding:8px 22px; border-radius:30px;
      font-size:1.15rem; font-weight:600;
      opacity:0; transition:opacity 0.4s ease, transform 0.4s ease;
      border:1px solid rgba(255,255,255,0.15);
      box-shadow:0 4px 24px rgba(0,0,0,0.5);
      z-index:10; white-space:nowrap;
      font-family:'Segoe UI',sans-serif;
    }
    #donorBadge.visible { opacity:1; transform:translateX(-50%) translateY(0); }
    #donorBadge .amount { color:#ffd700; margin-right:6px; font-size:1.2rem; }

    #dot {
      position:absolute; top:10px; right:10px;
      width:10px; height:10px; border-radius:50%;
      background:#f00; opacity:0.5; z-index:99;
    }
    #dot.ok { background:#0f0; }
  </style>
</head>
<body>
  <div id="dot"></div>
  <div id="videoContainer">
    <iframe id="ytFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div id="donorBadge">
    <span class="amount" id="badgeAmt"></span>
    <span id="badgeName"></span>
  </div>

<script>
  const container = document.getElementById('videoContainer');
  const ytFrame   = document.getElementById('ytFrame');
  const badge     = document.getElementById('donorBadge');
  const dot       = document.getElementById('dot');
  let stopTimer;

  function connect() {
    // WS auf demselben Host:Port wie die Seite, unter /ws
    const ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen  = () => { dot.classList.add('ok'); console.log('WS connected'); };
    ws.onclose = () => { dot.classList.remove('ok'); setTimeout(connect, 3000); };
    ws.onerror = () => ws.close();

    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.action === 'play') play(msg);
        if (msg.action === 'stop') stop();
      } catch(err) { console.error(err); }
    };
  }

  function play(msg) {
    clearTimeout(stopTimer);
    document.getElementById('badgeAmt').textContent  = `${msg.amount}${msg.currency}`;
    document.getElementById('badgeName').textContent = msg.donorName || '';
    badge.classList.add('visible');

    ytFrame.src = msg.url;
    container.classList.add('visible');

    stopTimer = setTimeout(stop, (msg.duration + 3) * 1000);
  }

  function stop() {
    clearTimeout(stopTimer);
    container.classList.remove('visible');
    badge.classList.remove('visible');
    setTimeout(() => { ytFrame.src = ''; }, 500);
  }

  connect();
</script>
</body>
</html>
